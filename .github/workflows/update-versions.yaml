name: Update versions

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Fetch latest versions
        uses: nick-fields/retry@v4
        with:
          max_attempts: 5
          timeout_minutes: 10
          command: |
            set -uo pipefail
            BUSYBOX=$(git ls-remote --tags https://git.busybox.net/busybox/ \
              | awk -F/ '/[0-9_]+$/ {gsub("_", "."); print $3}' 
              | sort -V | tail -1)

            : ${BUSYBOX:?}
            
            jq \
              --arg busybox "$BUSYBOX" \
              '
                .busybox.version = $busybox
              ' sources.json > tmp.json && mv tmp.json sources.json

            git diff sources.json
            
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: update-versions
          delete-branch: true
          title: Update BusyBox
          commit-message: Update BusyBox
